<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    
    <!-- 1. Minimal Central Hub Node -->
    <circle cx="120" cy="60" r="1.8" fill="#ffd84d" stroke="none" />

    <!-- 2. Orbiting Taxonomic Branch Lines -->
    <g stroke="#8e8e93" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.45" fill="none">
        <!-- Top Branch to Triangle -->
        <line x1="120" y1="58" x2="120" y2="35.5" />
        <!-- Top-Right Branch to Cube -->
        <line x1="121.5" y1="59" x2="165.5" y2="46.25" />
        <!-- Bottom-Right Branch to Hexagon -->
        <line x1="121.3" y1="61" x2="151.5" y2="81.25" />
        <!-- Bottom-Left Branch to Angle -->
        <line x1="118.7" y1="61" x2="89" y2="81.25" />
        <!-- Top-Left Branch to Line Segment (Anchors at x=84) -->
        <line x1="118.5" y1="59" x2="84" y2="42.5" />
    </g>

    <!-- 3. Surrounding Geometry Classifications (Ultra-sleek 1.2px thin strokes) -->
    <g fill="none" stroke-linejoin="round" stroke-linecap="round">
        
        <!-- ICON 1: 2D TRIANGLE (Top - Centered) -->
        <path d="M 120 23 L 111.5 35.5 L 128.5 35.5 Z" stroke="#ffd84d" stroke-width="1.2" />

        <!-- ICON 2: 3D CUBE (Top-Right - Shifted Right & Sleek) -->
        <!-- Outer perimeter -->
        <path d="M 172 35 L 178.5 38.75 L 178.5 46.25 L 172 50 L 165.5 46.25 L 165.5 38.75 Z" stroke="#ffd84d" stroke-width="1.2" />
        <!-- Micro-dashed interior Y-lines representing transparent volume -->
        <g stroke="#ffd84d" stroke-width="0.8" stroke-dasharray="1.5,1.5">
            <line x1="172" y1="42.5" x2="172" y2="35" />
            <line x1="172" y1="42.5" x2="178.5" y2="46.25" />
            <line x1="172" y1="42.5" x2="165.5" y2="46.25" />
        </g>

        <!-- ICON 3: POLYGON HEXAGON (Bottom-Right - Shifted Right) -->
        <path d="M 158 77.5 L 164.5 81.25 L 164.5 88.75 L 158 92.5 L 151.5 88.75 L 151.5 81.25 Z" stroke="#ffd84d" stroke-width="1.2" />

        <!-- ICON 4: ANGLE ARC (Bottom-Left - Shifted Left) -->
        <path d="M 89 91.5 L 76 91.5 L 84 78.5" stroke="#ffd84d" stroke-width="1.2" />
        <!-- Delicate Cyan-Blue Arc -->
        <path d="M 83 91.5 A 7 7 0 0 0 80.5 86.2" stroke="#54c5ff" stroke-width="1.0" opacity="0.85" />

        <!-- ICON 5: 1D LINE SEGMENT (Top-Left - Bounded by clean endpoint dots) -->
        <line x1="52" y1="42.5" x2="84" y2="42.5" stroke="#ffd84d" stroke-width="1.2" />
        <!-- Left Endpoint Dot -->
        <circle cx="52" cy="42.5" r="2.0" fill="#ffd84d" stroke="none" />
        <!-- Right Endpoint Dot -->
        <circle cx="84" cy="42.5" r="2.0" fill="#ffd84d" stroke="none" />

    </g>
</svg>
