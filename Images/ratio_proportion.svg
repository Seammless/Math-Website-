<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <!-- LEFT COLUMN (Group A): 2 yellow squircles representing quantity 2 -->
    <rect x="52" y="34" width="20" height="20" rx="7" fill="#ffd84d" />
    <rect x="52" y="66" width="20" height="20" rx="7" fill="#ffd84d" />

    <!-- SYMMETRICAL RATIO COLON (:) between groups -->
    <g>
        <circle cx="102" cy="52" r="5" fill="#f5f5f5" opacity="0.4" />
        <circle cx="102" cy="68" r="5" fill="#f5f5f5" opacity="0.4" />
    </g>

    <!-- RIGHT GROUP (Group B): 4 soft-white squircles in a 2x2 grid representing quantity 4 -->
    <rect x="132" y="34" width="20" height="20" rx="7" fill="#f5f5f5" />
    <rect x="132" y="66" width="20" height="20" rx="7" fill="#f5f5f5" />
    <rect x="164" y="34" width="20" height="20" rx="7" fill="#f5f5f5" />
    <rect x="164" y="66" width="20" height="20" rx="7" fill="#f5f5f5" />
</svg>
