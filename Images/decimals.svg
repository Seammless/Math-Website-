<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <!-- MAIN WHOLE NUMBER BLOCK: Typographic Yellow (#ffd84d) Rounded Rect -->
    <g>
        <rect x="70" y="41" width="64" height="38" rx="6" fill="#ffd84d" />
        <text x="102" y="68" fill="#181818" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5" text-anchor="middle">12</text>
    </g>

    <!-- SLOTTED PHYSICAL LINK (Sleek minimalist connector indicator between blocks) -->
    <line x1="134" y1="60" x2="138" y2="60" stroke="#54c5ff" stroke-width="2" stroke-linecap="round" opacity="0.6" />

    <!-- DECIMAL EXTENSION BLOCK: Attached Smaller Cyan-Blue (#54c5ff) Outline Rounded Rect (2px border) -->
    <g>
        <rect x="138" y="49" width="32" height="22" rx="4" fill="none" stroke="#54c5ff" stroke-width="2" />
        <text x="154" y="65" fill="#54c5ff" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="13" font-weight="900" text-anchor="middle">.5</text>
    </g>
</svg>
