<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <style>
        /* Pure static premium styles for integers.svg - completely animation-free */
        #positive-group {
            opacity: 1;
            filter: drop-shadow(0 0 3px rgba(255, 216, 77, 0.45));
        }
        #negative-group {
            opacity: 1;
            filter: drop-shadow(0 0 3px rgba(84, 197, 255, 0.45));
        }
        #reversal-symbol {
            opacity: 0.35;
        }
    </style>

    <g fill="none" stroke-linejoin="round" stroke-linecap="round">
        
        <!-- ================= LEFT SIDE: POSITIVE STATE (+5 floating) ================= -->
        <g id="positive-group">
            <!-- Plus Sign '+' (Clean and sleek) -->
            <line x1="49.5" y1="60" x2="55.5" y2="60" stroke="#ffd84d" stroke-width="1.8" />
            <line x1="52.5" y1="56" x2="52.5" y2="64" stroke="#ffd84d" stroke-width="1.8" />
            
            <!-- Sleek Modern Numeral '5' (Cubic Bezier curves, stroke thinned to 1.8) -->
            <path d="M 74 44 L 60 44 L 60 56 C 70 56 73 60 73 66 C 73 72 69 76 60 76" stroke="#ffd84d" stroke-width="1.8" />
        </g>


        <!-- ================= RIGHT SIDE: NEGATIVE STATE (-5 floating) ================= -->
        <g id="negative-group">
            <!-- Minus Sign '-' (Clean and sleek) -->
            <line x1="165.5" y1="60" x2="171.5" y2="60" stroke="#54c5ff" stroke-width="1.8" />
            
            <!-- Sleek Modern Numeral '5' (Cubic Bezier curves, stroke thinned to 1.8) -->
            <path d="M 190 44 L 176 44 L 176 56 C 186 56 189 60 189 66 C 189 72 185 76 176 76" stroke="#54c5ff" stroke-width="1.8" />
        </g>


        <!-- ================= CENTER: REVERSAL / LOADING SYMBOL (Ultra-minimal 1.2px stroke) ================= -->
        <g id="reversal-symbol" stroke="#f5f5f7" stroke-width="1.2">
            <!-- Top Sweep Arc (from Left x=104 to Right x=136) -->
            <path d="M 104 60 A 16 16 0 0 1 136 60" />
            <!-- Micro Arrowhead on Right end pointing downwards -->
            <polyline points="132.5 56.5 136 60 139.5 56.5" />

            <!-- Bottom Sweep Arc (from Right x=136 to Left x=104) -->
            <path d="M 136 60 A 16 16 0 0 1 104 60" />
            <!-- Micro Arrowhead on Left end pointing upwards -->
            <polyline points="107.5 63.5 104 60 100.5 63.5" />
        </g>

    </g>
</svg>
