<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <!-- LEFT PRIMARY VARIABLE TOKEN: Unknown Variable "x" (Accent Yellow #ffd84d) -->
    <g>
        <rect x="45" y="46" width="28" height="28" rx="5" fill="#ffd84d" />
        <text x="59" y="66" fill="#181818" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" text-anchor="middle">x</text>
    </g>

    <!-- ALGEBRAIC OPERATION: Plus Three (+ 3) (Subtle Plus at 40% opacity, Solid Soft-White "3") -->
    <text x="105" y="67" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" text-anchor="middle">
        <tspan fill="#f5f5f5" opacity="0.4">+ </tspan>
        <tspan fill="#f5f5f5">3</tspan>
    </text>

    <!-- CYAN-BLUE EQUALS SIGN (=): Represents Symbolic Equality (Cyan-Blue #54c5ff at 70% opacity) -->
    <g>
        <line x1="137" y1="57" x2="151" y2="57" stroke="#54c5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
        <line x1="137" y1="63" x2="151" y2="63" stroke="#54c5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    </g>

    <!-- RIGHT RESULT VARIABLE TOKEN: Result Variable "y" (Soft-White #f5f5f5) -->
    <g>
        <rect x="167" y="46" width="28" height="28" rx="5" fill="#f5f5f5" />
        <text x="181" y="66" fill="#181818" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" text-anchor="middle">y</text>
    </g>
</svg>
