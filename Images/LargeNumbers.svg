<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" role="img" aria-labelledby="title">
  <title id="title">Large Numbers</title>
  <rect width="800" height="320" fill="#0b0b0b" />
  <text x="400" y="60" fill="#ffd54f" font-family="Inter, Arial, Helvetica, sans-serif" font-size="36" font-weight="700" text-anchor="middle">Large Numbers</text>
  <circle cx="114" cy="210" r="54" fill="none" stroke="#ffd54f" stroke-width="4" />
  <text x="114" y="210" fill="#ffd54f" font-family="Inter, Arial, Helvetica, sans-serif" font-size="26" font-weight="700" text-anchor="middle" dominant-baseline="middle">10,000</text>
  <circle cx="326" cy="210" r="78" fill="none" stroke="#ffd54f" stroke-width="6" />
  <text x="326" y="210" fill="#ffd54f" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="700" text-anchor="middle" dominant-baseline="middle">1,00,000</text>
  <circle cx="590" cy="210" r="106" fill="none" stroke="#ffd54f" stroke-width="8" />
  <text x="590" y="210" fill="#ffd54f" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">10,00,000</text>
</svg>
