<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <!-- Ambient Floating Single-Digit Numbers (Organic & Safe Layout) -->
    <g fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-weight="600" stroke="none">
        <!-- 1. Top Left Area -->
        <text x="50" y="32" font-size="11" opacity="0.10" text-anchor="middle">4</text>
        
        <!-- 2. Far Right Area -->
        <text x="190" y="42" font-size="13" opacity="0.12" text-anchor="middle">7</text>
        
        <!-- 3. Bottom Left Area -->
        <text x="38" y="75" font-size="10" opacity="0.08" text-anchor="middle">3</text>
        
        <!-- 4. Bottom Right Area -->
        <text x="200" y="88" font-size="12" opacity="0.11" text-anchor="middle">8</text>
        
        <!-- 5. Top Right Inner Area -->
        <text x="162" y="28" font-size="9" opacity="0.09" text-anchor="middle">5</text>
    </g>

    <!-- Central connecting vertical line (extremely subtle) -->
    <line x1="120" y1="20" x2="120" y2="100" stroke="#ffd84d" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.2" />

    <g fill="#181818" stroke="#ffd84d" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
        <!-- 1 Block -->
        <rect x="110" y="28" width="20" height="14" rx="2" />
        <text x="120" y="38" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" text-anchor="middle" stroke="none">1</text>
        
        <!-- 10 Block -->
        <rect x="100" y="46" width="40" height="14" rx="2" />
        <text x="120" y="56" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" text-anchor="middle" stroke="none">10</text>
        
        <!-- 100 Block -->
        <rect x="85" y="64" width="70" height="14" rx="2" />
        <text x="120" y="74" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" text-anchor="middle" stroke="none">100</text>
        
        <!-- 1000 Block -->
        <rect x="65" y="82" width="110" height="14" rx="2" />
        <text x="120" y="92" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" text-anchor="middle" stroke="none">1000</text>
    </g>
</svg>
