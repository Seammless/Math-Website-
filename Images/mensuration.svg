<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="100%" height="100%">
    <!-- 3D CYLINDER SHADING FILLS (Subtle suggestions of area and volume) -->
    <!-- Top base area fill -->
    <ellipse cx="130" cy="35" rx="30" ry="9" fill="#ffd84d" opacity="0.08" />
    <!-- Volume body fill -->
    <path d="M 100 35 A 30 9 0 0 1 160 35 L 160 85 A 30 9 0 0 1 100 85 Z" fill="#ffd84d" opacity="0.04" />

    <!-- PRIMARY CYLINDER STRUCTURE (Accent Yellow #ffd84d) -->
    <!-- Sides and bottom curved base -->
    <path d="M 100 35 L 100 85 A 30 9 0 0 0 160 85 L 160 35" fill="none" stroke="#ffd84d" stroke-width="2" stroke-linecap="round" />
    <!-- Top elliptical rim -->
    <ellipse cx="130" cy="35" rx="30" ry="9" fill="none" stroke="#ffd84d" stroke-width="2" />

    <!-- MEASUREMENT INDICATORS (Subtle Low-Opacity Soft-White/Gray #f5f5f5 Guidelines) -->
    
    <!-- 1. Top Base Radius Indicator (r) -->
    <line x1="130" y1="35" x2="160" y2="35" stroke="#f5f5f5" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.3" />
    <!-- Top Center Origin Point (Cyan-Blue #54c5ff Highlight at 70% Opacity) -->
    <circle cx="130" cy="35" r="2" fill="#54c5ff" opacity="0.7" />

    <!-- 2. Vertical Height Dimension Marker (h) -->
    <!-- Height Bounding Extension Lines (Very low opacity dashed guide lines) -->
    <line x1="100" y1="35" x2="88" y2="35" stroke="#f5f5f5" stroke-width="1" stroke-dasharray="2,2" opacity="0.15" />
    <line x1="100" y1="85" x2="88" y2="85" stroke="#f5f5f5" stroke-width="1" stroke-dasharray="2,2" opacity="0.15" />
    <!-- Height Center Dimension Line -->
    <line x1="85" y1="35" x2="85" y2="85" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />
    <!-- Height Top and Bottom End Ticks -->
    <line x1="81" y1="35" x2="89" y2="35" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />
    <line x1="81" y1="85" x2="89" y2="85" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />

    <!-- 3. Bottom Diameter/Width Dimension Marker (d) -->
    <!-- Width Bounding Extension Lines -->
    <line x1="100" y1="85" x2="100" y2="101" stroke="#f5f5f5" stroke-width="1" stroke-dasharray="2,2" opacity="0.15" />
    <line x1="160" y1="85" x2="160" y2="101" stroke="#f5f5f5" stroke-width="1" stroke-dasharray="2,2" opacity="0.15" />
    <!-- Width Center Dimension Line -->
    <line x1="100" y1="104" x2="160" y2="104" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />
    <!-- Width Left and Right End Ticks -->
    <line x1="100" y1="100" x2="100" y2="108" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />
    <line x1="160" y1="100" x2="160" y2="108" stroke="#f5f5f5" stroke-width="1.5" opacity="0.3" />
</svg>
