<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="300px" height="300px">
    <!-- The Axis Line Group (Perfect visual weight sweet-spot with +8px offset) -->
    <g stroke="#ffd84d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Main horizontal line starting at 0 (x=28) and extending to arrow wings (x=220) -->
        <line x1="28" y1="60" x2="220" y2="60" />
        
        <!-- Arrowhead at the right end pointing to infinity (tip at x=228) -->
        <polyline points="220 53 228 60 220 67" />
        
        <!-- Definitive starting boundary at 0 (x=28) -->
        <line x1="28" y1="51" x2="28" y2="69" stroke-width="2" />
    </g>

    <!-- Number Axis Points & Labels -->
    <g fill="none">
        <!-- Point 0 -->
        <circle cx="28" cy="60" r="2.5" fill="#ffd84d" />
        <text x="28" y="86" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" stroke="none">0</text>

        <!-- Point 1 -->
        <circle cx="61" cy="60" r="2.5" fill="#ffd84d" />
        <text x="61" y="86" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" stroke="none">1</text>

        <!-- Point 2 -->
        <circle cx="94" cy="60" r="2.5" fill="#ffd84d" />
        <text x="94" y="86" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" stroke="none">2</text>

        <!-- Point 3 (Highlighted) -->
        <!-- Subtle Glow outer ring -->
        <circle cx="127" cy="60" r="8.5" stroke="#ffd84d" stroke-width="1.5" opacity="0.25" />
        <circle cx="127" cy="60" r="4.5" fill="#ffd84d" />
        <text x="127" y="87" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" text-anchor="middle" stroke="none" filter="drop-shadow(0 0 3px rgba(255, 216, 77, 0.4))">3</text>

        <!-- Point 4 -->
        <circle cx="160" cy="60" r="2.5" fill="#ffd84d" />
        <text x="160" y="86" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" stroke="none">4</text>

        <!-- Point 5 -->
        <circle cx="193" cy="60" r="2.5" fill="#ffd84d" />
        <text x="193" y="86" fill="#ffd84d" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" stroke="none">5</text>
    </g>
</svg>
